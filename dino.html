<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لعبة الديناصور - Ayoub Makkawi</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      overflow-y: auto;
    }
    .game-wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      width: 100%;
      max-width: 800px;
      min-height: 100vh;
    }
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 12px 20px;
      background: rgba(15, 15, 30, 0.85);
      border: 1px solid rgba(0, 240, 255, 0.12);
      border-radius: 12px;
      margin-bottom: 12px;
      backdrop-filter: blur(10px);
    }
    .game-header h1 {
      font-family: 'Orbitron', monospace;
      font-size: 0.9em;
      color: #fff;
      letter-spacing: 2px;
    }
    .game-header h1 .c { color: #00f0ff; }
    .game-header h1 .o { color: #00ff41; }
    .game-header h1 .l { color: #8b00ff; }
    .game-header .back-link {
      font-family: 'Orbitron', monospace;
      font-size: 0.65em;
      color: #6b6b80;
      text-decoration: none;
      padding: 5px 12px;
      border: 1px solid rgba(0, 240, 255, 0.12);
      border-radius: 8px;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .game-header .back-link:hover { color: #00f0ff; border-color: rgba(0,240,255,0.3); }
    .game-canvas-wrap {
      position: relative;
      width: 100%;
      max-width: 900px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(0, 240, 255, 0.12);
      box-shadow: 0 0 60px rgba(0, 240, 255, 0.03);
      touch-action: manipulation;
    }
    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 750/400;
      background: #0f0f1a;
      cursor: pointer;
      touch-action: manipulation;
    }
    .overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      font-family: 'Orbitron', monospace;
    }
    .overlay .title {
      font-size: 1.6em;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 30px rgba(0, 240, 255, 0.3), 0 0 60px rgba(0, 240, 255, 0.1);
      letter-spacing: 4px;
      margin-bottom: 8px;
    }
    .overlay .title .c { color: #00f0ff; }
    .overlay .title .o { color: #00ff41; }
    .overlay .title .l { color: #8b00ff; }
    .overlay .sub {
      font-size: 0.7em;
      color: #6b6b80;
      letter-spacing: 2px;
      animation: pulse-text 2s infinite;
    }
    .overlay .sub i { margin: 0 6px; }
    @keyframes pulse-text {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .overlay.hidden { display: none; }

    .controls-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .controls-bar span {
      font-size: 0.7em;
      color: #6b6b80;
      font-family: 'Orbitron', monospace;
    }
    .controls-bar kbd {
      background: rgba(0, 240, 255, 0.08);
      color: #00f0ff;
      padding: 3px 10px;
      border-radius: 5px;
      border: 1px solid rgba(0, 240, 255, 0.15);
      font-family: 'Orbitron', monospace;
      font-size: 0.85em;
    }
    .game-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 15, 0.75);
      backdrop-filter: blur(6px);
      font-family: 'Orbitron', monospace;
      pointer-events: none;
    }
    .game-overlay.show { display: flex; }
    .game-overlay .go-btn { pointer-events: auto; }
    .game-overlay .go-title {
      font-size: 1.5em;
      font-weight: 900;
      color: #ff0040;
      text-shadow: 0 0 30px rgba(255,0,64,0.3), 0 0 60px rgba(255,0,64,0.1);
      letter-spacing: 6px;
      margin-bottom: 6px;
    }
    .game-overlay .go-score {
      font-size: 1.1em;
      color: #6b6b80;
      margin-bottom: 4px;
    }
    .game-overlay .go-score .v { color: #00ff41; font-weight: 900; font-size: 1.6em; }
    .game-overlay .go-best {
      font-size: 0.9em;
      color: #6b6b80;
      margin-bottom: 18px;
    }
    .game-overlay .go-best .v { color: #8b00ff; font-weight: 700; font-size: 1.3em; }
    .game-overlay .go-btn {
      pointer-events: auto;
      padding: 8px 28px;
      background: rgba(0, 240, 255, 0.08);
      border: 1px solid rgba(0, 240, 255, 0.3);
      border-radius: 8px;
      color: #00f0ff;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Orbitron', monospace;
      font-size: 0.75em;
      letter-spacing: 2px;
    }
    .game-overlay .go-btn:hover { background: rgba(0, 240, 255, 0.18); box-shadow: 0 0 25px rgba(0,240,255,0.1); }
  </style>
</head>
<body>
<div class="game-wrapper">
  <div class="game-header">
    <h1><span class="c">✦</span> <span class="c">D</span><span class="o">I</span><span class="l">N</span><span class="c">O</span> <span class="o">RUN</span></h1>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> رجوع</a>
  </div>

  <div class="game-canvas-wrap">
    <canvas id="game-canvas" width="750" height="300"></canvas>

    <div class="overlay" id="start-overlay">
      <div class="title"><span class="c">✦</span> DINO <span class="o">RUN</span> <span class="l">✦</span></div>
      <div class="sub"><i class="fas fa-arrow-left"></i> Space أو اضغط للبدء <i class="fas fa-arrow-right"></i></div>
    </div>

    <div class="game-overlay" id="game-overlay">
      <div class="go-title">GAME OVER</div>
      <div class="go-score">النقاط: <span class="v" id="final-score">0</span></div>
      <div class="go-best">الأفضل: <span class="v" id="final-best">0</span></div>
      <div class="go-btn" id="restart-btn">⟳ إعادة</div>
    </div>
  </div>

  <div class="controls-bar">
    <span><kbd>Space</kbd> / <kbd>↑</kbd> أو اضغط للقفز</span>
  </div>
</div>

<script>
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const startOverlay = document.getElementById('start-overlay');
const gameOverlay = document.getElementById('game-overlay');
const finalScoreEl = document.getElementById('final-score');
const finalBestEl = document.getElementById('final-best');
const restartBtn = document.getElementById('restart-btn');

const W = 750, H = 400, GROUND_Y = 270;

let game = {
  started: false, over: false,
  score: 0, highScore: parseInt(localStorage.getItem('dinoHigh')) || 0,
  speed: 5, targetSpeed: 5, frame: 0,
  accumulator: 0, step: 1000/60, lastTime: 0,
};

const dino = {
  x: 65, y: GROUND_Y - 46, w: 40, h: 46,
  vy: 0, jumping: false,
  leg: 0, legT: 0,
};

let obstacles = [], clouds = [], stars = [], dust = [], popups = [], shake = 0;

// Stars
for (let i = 0; i < 50; i++) {
  stars.push({
    x: Math.random() * W, y: Math.random() * (GROUND_Y - 40),
    r: 0.3 + Math.random() * 1.2, b: 0.3 + Math.random() * 0.7, t: Math.random() * 100,
  });
}

// ======= DRAWING =======

function drawBg() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#07070d');
  g.addColorStop(0.2, '#0a0a14');
  g.addColorStop(0.5, '#0d0d1a');
  g.addColorStop(0.8, '#101020');
  g.addColorStop(1, '#121225');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawStarsFn() {
  stars.forEach(s => {
    const flicker = 0.7 + 0.3 * Math.sin(game.frame * 0.03 + s.t);
    ctx.globalAlpha = s.b * flicker;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
    if (s.r > 0.8) {
      ctx.globalAlpha = s.b * flicker * 0.15;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * 3, 0, Math.PI * 2);
      ctx.fill();
    }
  });
  ctx.globalAlpha = 1;
}

function drawMoonFn() {
  const mx = 620, my = 40, mr = 26;
  ctx.fillStyle = 'rgba(0, 240, 255, 0.04)';
  ctx.beginPath();
  ctx.arc(mx, my, mr + 12, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(0, 240, 255, 0.06)';
  ctx.beginPath();
  ctx.arc(mx, my, mr, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(0, 240, 255, 0.03)';
  ctx.beginPath();
  ctx.arc(mx - 6, my - 6, mr - 3, 0, Math.PI * 2);
  ctx.fill();
  // Craters
  ctx.fillStyle = 'rgba(0, 240, 255, 0.02)';
  ctx.beginPath();
  ctx.arc(mx + 6, my + 4, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(mx - 8, my + 8, 3, 0, Math.PI * 2);
  ctx.fill();
}

function drawMountains() {
  ctx.fillStyle = 'rgba(0, 240, 255, 0.025)';
  const off = (game.frame * 0.2) % 200;
  for (let i = -1; i < 6; i++) {
    const mx = i * 150 - off;
    ctx.beginPath();
    ctx.moveTo(mx, GROUND_Y);
    ctx.lineTo(mx + 40, GROUND_Y - 35 - Math.sin(i * 1.5) * 12);
    ctx.lineTo(mx + 80, GROUND_Y - 20 + Math.sin(i * 2) * 8);
    ctx.lineTo(mx + 120, GROUND_Y);
    ctx.closePath();
    ctx.fill();
  }
}

function drawGroundFn() {
  const g = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  g.addColorStop(0, 'rgba(0, 240, 255, 0.06)');
  g.addColorStop(0.15, 'rgba(0, 240, 255, 0.02)');
  g.addColorStop(1, 'rgba(0, 240, 255, 0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  // Ground glow line
  ctx.shadowColor = 'rgba(0, 240, 255, 0.15)';
  ctx.shadowBlur = 4;
  ctx.strokeStyle = 'rgba(0, 240, 255, 0.3)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(W, GROUND_Y);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Dashes
  ctx.strokeStyle = 'rgba(0, 240, 255, 0.07)';
  ctx.lineWidth = 1;
  const o = -(game.frame * game.speed * 0.5) % 20;
  for (let x = o; x < W; x += 20) {
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y + 3);
    ctx.lineTo(x + 8, GROUND_Y + 3);
    ctx.stroke();
  }

  // Ground grid
  ctx.strokeStyle = 'rgba(0, 240, 255, 0.015)';
  ctx.lineWidth = 1;
  for (let y = GROUND_Y + 12; y < H; y += 12) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
}

function drawDinoFn() {
  const dx = dino.x, dy = dino.y, dw = dino.w, dh = dino.h;

  // Glow
  ctx.shadowColor = 'rgba(0, 255, 65, 0.25)';
  ctx.shadowBlur = 18;

  // Tail
  ctx.fillStyle = '#00cc33';
  ctx.beginPath();
  ctx.moveTo(dx + 2, dy + dh * 0.25);
  ctx.lineTo(dx - 14, dy + dh * 0.15);
  ctx.lineTo(dx - 10, dy + dh * 0.3);
  ctx.lineTo(dx - 16, dy + dh * 0.4);
  ctx.lineTo(dx + 2, dy + dh * 0.55);
  ctx.closePath();
  ctx.fill();

  // Spikes
  ctx.fillStyle = '#00ff41';
  for (let i = 0; i < 5; i++) {
    const sx = dx + dw - 5 - i * 6;
    ctx.beginPath();
    ctx.moveTo(sx, dy + 1);
    ctx.lineTo(sx + 3, dy - 7 - i % 2 * 2);
    ctx.lineTo(sx + 6, dy + 1);
    ctx.closePath();
    ctx.fill();
  }

  // Body
  ctx.fillStyle = '#00ff41';
  const r = 5;
  ctx.beginPath();
  ctx.moveTo(dx + r, dy);
  ctx.lineTo(dx + dw - r, dy);
  ctx.quadraticCurveTo(dx + dw, dy, dx + dw, dy + r);
  ctx.lineTo(dx + dw, dy + dh - r);
  ctx.quadraticCurveTo(dx + dw, dy + dh, dx + dw - r, dy + dh);
  ctx.lineTo(dx + r, dy + dh);
  ctx.quadraticCurveTo(dx, dy + dh, dx, dy + dh - r);
  ctx.lineTo(dx, dy + r);
  ctx.quadraticCurveTo(dx, dy, dx + r, dy);
  ctx.closePath();
  ctx.fill();

  // Belly
  ctx.fillStyle = 'rgba(0, 255, 65, 0.12)';
  ctx.fillRect(dx + 5, dy + dh * 0.5, dw - 10, dh * 0.35);

  // Arms
  ctx.fillStyle = '#00cc33';
  ctx.fillRect(dx + dw - 5, dy + dh * 0.5, 4, 8);
  ctx.fillRect(dx + dw - 5, dy + dh * 0.5 + 4, 7, 3);

  // Eye
  ctx.fillStyle = '#0a0a0f';
  ctx.beginPath();
  ctx.arc(dx + dw - 9, dy + 13, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(dx + dw - 9, dy + 13, 3.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowColor = 'rgba(0, 240, 255, 0.6)';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#00f0ff';
  ctx.beginPath();
  ctx.arc(dx + dw - 8, dy + 13, 2.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath();
  ctx.arc(dx + dw - 10, dy + 11, 1, 0, Math.PI * 2);
  ctx.fill();

  // Mouth
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(dx + dw - 4, dy + 21, 5, 1.5);
  ctx.fillRect(dx + dw - 3, dy + 23.5, 4, 1);
  // Teeth
  ctx.fillStyle = '#fff';
  ctx.fillRect(dx + dw - 4, dy + 20, 2, 2);
  ctx.fillRect(dx + dw - 1, dy + 20, 2, 2);

  // Nostril
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(dx + dw - 6, dy + 17, 2, 1.5);

  // Legs (tiny bumps on the bottom)
  ctx.shadowBlur = 0;
  const bot = dy + dh;
  if (dino.jumping) {
    ctx.fillStyle = '#00cc33';
    ctx.fillRect(dx + 5, bot - 6, 7, 6);
    ctx.fillRect(dx + dw - 12, bot - 6, 7, 6);
  } else {
    ctx.fillStyle = '#00cc33';
    if (dino.leg === 0) {
      ctx.fillRect(dx + 5, bot - 6, 7, 6);
      ctx.fillRect(dx + dw - 12, bot - 2, 7, 3);
    } else {
      ctx.fillRect(dx + 5, bot - 2, 7, 3);
      ctx.fillRect(dx + dw - 12, bot - 6, 7, 6);
    }
    ctx.fillStyle = '#009933';
    ctx.fillRect(dx + 3, bot - 1, 12, 2);
    ctx.fillRect(dx + dw - 15, bot - 1, 12, 2);
  }
  ctx.shadowBlur = 0;

  // Dust
  if (!dino.jumping && game.started && !game.over) {
    if (game.frame % 3 === 0) {
      dust.push({ x: dx + 3, y: GROUND_Y, vx: -(1 + Math.random() * 1.5), vy: -(0.5 + Math.random() * 1.5), r: 2 + Math.random() * 3, life: 1, d: 0.025 + Math.random() * 0.025 });
    }
  }
}

function drawDustFn() {
  dust.forEach(p => {
    ctx.globalAlpha = p.life * 0.35;
    ctx.fillStyle = '#00f0ff';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawCloudsFn() {
  clouds.forEach(c => {
    ctx.globalAlpha = 0.035;
    ctx.fillStyle = '#00f0ff';
    ctx.beginPath();
    ctx.ellipse(c.x + c.w/2, c.y, c.w/2, c.h/2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x + c.w * 0.3, c.y - c.h * 0.25, c.w * 0.3, c.h * 0.45, 0, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawObstaclesFn() {
  obstacles.forEach(obs => {
    ctx.shadowColor = obs.type === 'bird' ? 'rgba(139,0,255,0.25)' : 'rgba(0,240,255,0.25)';
    ctx.shadowBlur = 12;

    if (obs.type === 'cactus') {
      // Pot
      ctx.fillStyle = 'rgba(0, 240, 255, 0.06)';
      ctx.fillRect(obs.x, obs.y + obs.h - 4, obs.w, 4);

      // Body
      ctx.fillStyle = '#00f0ff';
      ctx.fillRect(obs.x + 3, obs.y + 6, obs.w - 6, obs.h - 10);
      // Top cap
      ctx.fillRect(obs.x + 1, obs.y, obs.w - 2, 7);
      // Arms
      ctx.fillRect(obs.x - 3, obs.y + obs.h * 0.2, 5, 10);
      ctx.fillRect(obs.x + obs.w - 2, obs.y + obs.h * 0.35, 5, 10);
      // Spines
      ctx.fillStyle = 'rgba(0, 240, 255, 0.3)';
      for (let s = 0; s < 3; s++) {
        ctx.fillRect(obs.x + 4 + s * 5, obs.y + 9 + s * 8, 1.5, 3);
      }
      // Inner glow
      ctx.fillStyle = 'rgba(0, 240, 255, 0.08)';
      ctx.fillRect(obs.x + 6, obs.y + 10, obs.w - 12, obs.h - 16);

    } else if (obs.type === 'double') {
      ctx.fillStyle = '#00f0ff';
      ctx.fillRect(obs.x + 2, obs.y + 4, 13, obs.h - 4);
      ctx.fillRect(obs.x + obs.w - 15, obs.y + 2, 13, obs.h - 2);
      ctx.fillRect(obs.x + 2, obs.y, 13, 5);
      ctx.fillRect(obs.x + obs.w - 15, obs.y, 13, 5);
      ctx.fillStyle = 'rgba(0, 240, 255, 0.08)';
      ctx.fillRect(obs.x + 5, obs.y + 8, 7, obs.h - 16);
      ctx.fillRect(obs.x + obs.w - 12, obs.y + 6, 7, obs.h - 14);

    } else if (obs.type === 'bird') {
      const wingY = obs.y + Math.sin(game.frame * 0.12 + obs.wave) * 8;
      ctx.fillStyle = '#8b00ff';
      // Body
      ctx.fillRect(obs.x + 8, wingY + 5, obs.w - 16, 10);
      // Wings up/down
      ctx.fillRect(obs.x + 4, wingY - 4, obs.w * 0.4, 6);
      ctx.fillRect(obs.x + obs.w * 0.5, wingY - 4, obs.w * 0.4, 6);
      // Tail
      ctx.fillRect(obs.x, wingY + 7, 6, 4);
      // Eye
      ctx.fillStyle = '#fff';
      ctx.fillRect(obs.x + obs.w - 12, wingY + 6, 3, 3);
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(obs.x + obs.w - 11, wingY + 6, 2, 2);
      // Glow dots
      ctx.fillStyle = 'rgba(139,0,255,0.15)';
      ctx.beginPath();
      ctx.arc(obs.x + obs.w/2, wingY + 10, 6, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  });
}

function drawPopupsFn() {
  popups.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = '#00ff41';
    ctx.font = 'bold 13px Orbitron';
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,255,65,0.3)';
    ctx.shadowBlur = 10;
    ctx.fillText(p.text, p.x, p.y);
    ctx.shadowBlur = 0;
  });
  ctx.globalAlpha = 1;
}

function drawHUD() {
  // Score box
  ctx.fillStyle = 'rgba(10, 10, 15, 0.75)';
  ctx.strokeStyle = 'rgba(0, 240, 255, 0.12)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(8, 6, 170, 40, 6);
  ctx.fill();
  ctx.stroke();

  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '9px Orbitron';
  ctx.fillText('SCORE', 16, 20);

  ctx.fillStyle = '#00ff41';
  ctx.shadowColor = 'rgba(0,255,65,0.3)';
  ctx.shadowBlur = 10;
  ctx.font = '22px Orbitron';
  ctx.fillText(Math.floor(game.score / 10), 16, 42);
  ctx.shadowBlur = 0;

  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '9px Orbitron';
  ctx.fillText('BEST', 110, 20);

  ctx.fillStyle = '#8b00ff';
  ctx.shadowColor = 'rgba(139,0,255,0.3)';
  ctx.shadowBlur = 8;
  ctx.font = '16px Orbitron';
  ctx.fillText(game.highScore, 110, 40);
  ctx.shadowBlur = 0;

  // Speed (bottom right)
  ctx.fillStyle = 'rgba(10, 10, 15, 0.7)';
  ctx.beginPath();
  ctx.roundRect(W - 80, H - 26, 72, 18, 4);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = 'rgba(0, 240, 255, 0.5)';
  ctx.font = '9px Orbitron';
  ctx.textAlign = 'right';
  ctx.fillText('SPD ' + game.speed.toFixed(1), W - 10, H - 13);
}

// ======= UPDATE =======

function updateGameFn() {
  if (!game.started || game.over) return;
  game.frame++;

  game.targetSpeed = 5 + Math.floor(game.score / 100) * 0.3;
  if (game.targetSpeed > 14) game.targetSpeed = 14;
  game.speed += (game.targetSpeed - game.speed) * 0.02;
  game.score++;

  // Dino physics
  if (dino.jumping) {
    dino.vy += 0.55;
    dino.y += dino.vy;
    if (dino.y >= GROUND_Y - dino.h) {
      dino.y = GROUND_Y - dino.h;
      dino.vy = 0;
      dino.jumping = false;
    }
  }

  dino.h = 46;
  if (!dino.jumping) dino.y = GROUND_Y - 46;

  dino.legT++;
  if (dino.legT > 5) { dino.legT = 0; dino.leg = dino.leg === 0 ? 1 : 0; }

  // Spawn
  if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < W - 270) {
    if (Math.random() < 0.012 + game.speed * 0.0008) {
      const r = Math.random();
      let type, w, h;
      if (game.speed > 8 && r < 0.2) {
        type = 'bird'; w = 34; h = 18;
      } else if (r < 0.5) {
        type = 'double'; w = 30; h = 38 + Math.random() * 10;
      } else {
        type = 'cactus'; w = 22 + Math.random() * 8; h = 36 + Math.random() * 12;
      }
      obstacles.push({ x: W, y: type === 'bird' ? GROUND_Y - 60 - Math.random() * 30 : GROUND_Y - h, w, h, type, passed: false, wave: Math.random() * 100 });
    }
  }

  // Clouds
  if (Math.random() < 0.003) {
    clouds.push({ x: W, y: 20 + Math.random() * 80, w: 45 + Math.random() * 35, h: 14 + Math.random() * 10, speed: 0.2 + Math.random() * 0.4 });
  }

  obstacles.forEach(o => o.x -= game.speed);
  obstacles = obstacles.filter(o => o.x + o.w > -60);
  clouds.forEach(c => c.x -= c.speed);
  clouds = clouds.filter(c => c.x + c.w > -100);

  // Dust
  dust.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= p.d; });
  dust = dust.filter(p => p.life > 0);

  // Popups
  if (game.score > 0 && game.score % 500 === 0) {
    popups.push({ x: dino.x + 20, y: dino.y - 5, text: '+' + Math.floor(game.score / 10), life: 1, vy: -1.2 });
  }
  popups.forEach(p => { p.y += p.vy; p.life -= 0.02; });
  popups = popups.filter(p => p.life > 0);

  // Collision
  const db = { x: dino.x + 5, y: dino.y + 4, w: dino.w - 10, h: dino.h - 8 };
  for (const o of obstacles) {
    const ob = { x: o.x + 3, y: o.y + 3, w: o.w - 6, h: o.h - 6 };
    if (db.x < ob.x + ob.w && db.x + db.w > ob.x && db.y < ob.y + ob.h && db.y + db.h > ob.y) {
      gameOverFn();
      return;
    }
  }

  if (shake > 0) shake *= 0.85;
  if (shake < 0.1) shake = 0;
}

function gameOverFn() {
  game.over = true;
  shake = 10;
  const s = Math.floor(game.score / 10);
  finalScoreEl.textContent = s;
  if (s > game.highScore) { game.highScore = s; localStorage.setItem('dinoHigh', game.highScore); }
  finalBestEl.textContent = game.highScore;
  gameOverlay.classList.add('show');
}

function resetGameFn() {
  dino.y = GROUND_Y - 46;
  dino.vy = 0; dino.jumping = false;
  dino.leg = 0; dino.legT = 0;
  obstacles = []; clouds = []; dust = []; popups = [];
  game.score = 0; game.speed = 5; game.frame = 0;
  game.over = false; game.started = true;
  shake = 0;
  gameOverlay.classList.remove('show');
}

// ======= RENDER =======
function renderFn() {
  ctx.save();
  if (shake > 0) {
    ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
  }

  drawBg();
  drawStarsFn();
  drawMoonFn();
  drawMountains();
  drawCloudsFn();
  drawGroundFn();
  drawDustFn();
  drawObstaclesFn();
  drawDinoFn();
  // Redraw ground line on top so dino legs tuck under it
  ctx.shadowColor = 'rgba(0, 240, 255, 0.15)';
  ctx.shadowBlur = 4;
  ctx.strokeStyle = 'rgba(0, 240, 255, 0.35)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(W, GROUND_Y);
  ctx.stroke();
  ctx.shadowBlur = 0;
  drawPopupsFn();
  drawHUD();

  ctx.restore();
}

// ======= LOOP =======
let lt = 0;
function loop(t) {
  const dt = t - lt;
  lt = t;
  if (!game.over && game.started) {
    game.accumulator += dt;
    while (game.accumulator >= game.step) {
      updateGameFn();
      game.accumulator -= game.step;
    }
  }
  renderFn();
  requestAnimationFrame(loop);
}

// ======= CONTROLS =======
function onJump() {
  if (!game.started) { startOverlay.classList.add('hidden'); resetGameFn(); return; }
  if (game.over) { resetGameFn(); return; }
  if (!dino.jumping) { dino.vy = -12; dino.jumping = true; }
}

function handleInput(e) {
  if (e) e.preventDefault();
  onJump();
}

// Touch/click = jump
canvas.addEventListener('touchstart', e => { e.preventDefault(); onJump(); }, { passive: false });
canvas.addEventListener('mousedown', e => { onJump(); });
canvas.addEventListener('click', e => e.preventDefault());

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); onJump(); return; }
  if (e.code === 'ArrowDown') { e.preventDefault(); if (game.over) { onJump(); } }
});
restartBtn.addEventListener('click', e => { e.stopPropagation(); resetGameFn(); });

// ======= START =======
resetGameFn();
game.started = false;
startOverlay.classList.remove('hidden');
loop(0);
</script>
</body>
