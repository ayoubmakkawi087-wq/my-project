<script>
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const startOverlay = document.getElementById('start-overlay');
const gameOverlay = document.getElementById('game-overlay');
const finalScoreEl = document.getElementById('final-score');
const finalBestEl = document.getElementById('final-best');
const restartBtn = document.getElementById('restart-btn');

const W = 750, H = 400, GROUND_Y = 270;

let game = {
  started: false, over: false,
  score: 0, highScore: parseInt(localStorage.getItem('dinoHigh')) || 0,
  speed: 5, targetSpeed: 5, frame: 0,
  accumulator: 0, step: 1000/60, lastTime: 0,
};

const dino = {
  x: 65, y: GROUND_Y - 46, w: 40, h: 46,
  vy: 0, jumping: false,
  leg: 0, legT: 0,
};

let obstacles = [], clouds = [], stars = [], dust = [], popups = [], shake = 0;

for (let i = 0; i < 50; i++) {
  stars.push({
    x: Math.random() * W, y: Math.random() * (GROUND_Y - 40),
    r: 0.3 + Math.random() * 1.2, b: 0.3 + Math.random() * 0.7, t: Math.random() * 100,
  });
}

function drawBg() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#07070d');
  g.addColorStop(0.2, '#0a0a14');
  g.addColorStop(0.5, '#0d0d1a');
  g.addColorStop(0.8, '#101020');
  g.addColorStop(1, '#121225');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawStarsFn() {
  stars.forEach(s => {
    const flicker = 0.7 + 0.3 * Math.sin(game.frame * 0.03 + s.t);
    ctx.globalAlpha = s.b * flicker;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
    if (s.r > 0.8) {
      ctx.globalAlpha = s.b * flicker * 0.15;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * 3, 0, Math.PI * 2);
      ctx.fill();
    }
  });
  ctx.globalAlpha = 1;
}

function drawMoonFn() {
  const mx = 620, my = 40, mr = 26;
  ctx.fillStyle = 'rgba(0, 240, 255, 0.04)';
  ctx.beginPath();
  ctx.arc(mx, my, mr + 12, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(0, 240, 255, 0.06)';
  ctx.beginPath();
  ctx.arc(mx, my, mr, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(0, 240, 255, 0.03)';
  ctx.beginPath();
  ctx.arc(mx - 6, my - 6, mr - 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(0, 240, 255, 0.02)';
  ctx.beginPath();
  ctx.arc(mx + 6, my + 4, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(mx - 8, my + 8, 3, 0, Math.PI * 2);
  ctx.fill();
}

function drawMountains() {
  ctx.fillStyle = 'rgba(0, 240, 255, 0.025)';
  const off = (game.frame * 0.2) % 200;
  for (let i = -1; i < 6; i++) {
    const mx = i * 150 - off;
    ctx.beginPath();
    ctx.moveTo(mx, GROUND_Y);
    ctx.lineTo(mx + 40, GROUND_Y - 35 - Math.sin(i * 1.5) * 12);
    ctx.lineTo(mx + 80, GROUND_Y - 20 + Math.sin(i * 2) * 8);
    ctx.lineTo(mx + 120, GROUND_Y);
    ctx.closePath();
    ctx.fill();
  }
}

function drawGroundFn() {
  const g = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  g.addColorStop(0, 'rgba(0, 240, 255, 0.06)');
  g.addColorStop(0.15, 'rgba(0, 240, 255, 0.02)');
  g.addColorStop(1, 'rgba(0, 240, 255, 0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  ctx.shadowColor = 'rgba(0, 240, 255, 0.15)';
  ctx.shadowBlur = 4;
  ctx.strokeStyle = 'rgba(0, 240, 255, 0.3)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(W, GROUND_Y);
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.strokeStyle = 'rgba(0, 240, 255, 0.07)';
  ctx.lineWidth = 1;
  const o = -(game.frame * game.speed * 0.5) % 20;
  for (let x = o; x < W; x += 20) {
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y + 12);
    ctx.lineTo(x + 8, GROUND_Y + 12);
    ctx.stroke();
  }
}

function drawDinoFn() {
  ctx.save();
  ctx.shadowColor = 'rgba(0, 240, 255, 0.3)';
  ctx.shadowBlur = 12;

  if (dino.jumping && Math.random() < 0.3) {
    dust.push({
      x: dino.x + dino.w * 0.2,
      y: GROUND_Y - 2,
      vx: -(1 + Math.random() * 2),
      vy: -(Math.random() * 1.5),
      r: 1 + Math.random() * 2.5,
      life: 1.0,
    });
  }

  const dy = dino.y;
  ctx.fillStyle = '#00f0ff';

  ctx.fillRect(dino.x + 4, dy + 12, 28, 20);
  ctx.fillRect(dino.x + 20, dy, 18, 14);
  ctx.fillRect(dino.x + 24, dy + 10, 10, 6);
  ctx.fillRect(dino.x + 34, dy + 2, 6, 6);
  ctx.fillRect(dino.x, dy + 14, 6, 8);
  ctx.fillRect(dino.x - 4, dy + 16, 4, 4);

  ctx.fillStyle = '#8b00ff';
  ctx.fillRect(dino.x + 26, dy + 3, 3, 3);

  ctx.fillStyle = '#00f0ff';
  if (!dino.jumping) {
    if (dino.leg === 0) {
      ctx.fillRect(dino.x + 8, dy + 32, 4, 10);
      ctx.fillRect(dino.x + 22, dy + 32, 4, 6);
    } else {
      ctx.fillRect(dino.x + 8, dy + 32, 4, 6);
      ctx.fillRect(dino.x + 22, dy + 32, 4, 10);
    }
  } else {
    ctx.fillRect(dino.x + 10, dy + 32, 4, 6);
    ctx.fillRect(dino.x + 20, dy + 32, 4, 6);
  }

  ctx.restore();
}

function drawDustFn() {
  dust.forEach(p => {
    ctx.globalAlpha = p.life * 0.4;
    ctx.fillStyle = '#00f0ff';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawCloudsFn() {
  clouds.forEach(c => {
    ctx.globalAlpha = 0.035;
    ctx.fillStyle = '#00f0ff';
    ctx.beginPath();
    ctx.ellipse(c.x + c.w/2, c.y, c.w/2, c.h/2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x + c.w * 0.3, c.y - c.h * 0.25, c.w * 0.3, c.h * 0.45, 0, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawObstaclesFn() {
  obstacles.forEach(obs => {
    ctx.shadowColor = obs.type === 'bird' ? 'rgba(139,0,255,0.25)' : 'rgba(0,240,255,0.25)';
    ctx.shadowBlur = 12;
    if (obs.type === 'cactus') {
      ctx.fillStyle = 'rgba(0, 240, 255, 0.06)';
      ctx.fillRect(obs.x, obs.y + obs.h - 4, obs.w, 4);
      ctx.fillStyle = '#00f0ff';
      ctx.fillRect(obs.x + 3, obs.y + 6, obs.w - 6, obs.h - 10);
      ctx.fillRect(obs.x + 1, obs.y, obs.w - 2, 7);
      if (obs.w > 15) {
        ctx.fillRect(obs.x - 3, obs.y + 10, 4, 10);
        ctx.fillRect(obs.x + obs.w - 1, obs.y + 14, 4, 8);
      }
    } else {
      ctx.fillStyle = '#8b00ff';
      ctx.fillRect(obs.x, obs.y + 8, obs.w, obs.h - 12);
      ctx.fillRect(obs.x + 12, obs.y, 8, 8);
      const flap = Math.floor(game.frame / 12) % 2;
      if (flap === 0) {
        ctx.fillRect(obs.x + 4, obs.y - 4, 6, 8);
      } else {
        ctx.fillRect(obs.x + 4, obs.y + 12, 6, 8);
      }
    }
  });
  ctx.shadowBlur = 0;
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0, 240, 255, 0.6)';
  ctx.font = '700 13px "Orbitron", monospace';
  ctx.textAlign = 'right';
  ctx.fillText(`HI ${String(game.highScore).padStart(5, '0')}`, W - 20, 30);
  ctx.fillStyle = '#fff';
  ctx.fillText(`${String(Math.floor(game.score)).padStart(5, '0')}`, W - 110, 30);
}

function drawPopupsFn() {
  popups.forEach(p => {
    ctx.fillStyle = p.c;
    ctx.globalAlpha = p.alpha;
    ctx.font = '900 12px "Orbitron", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  });
  ctx.globalAlpha = 1;
}

function addPopupFn(x, y, text, c='#00ff41') {
  popups.push({ x, y, text, c, alpha: 1, vy: -1.5 });
}

function resetGameFn() {
  game.started = true;
  game.over = false;
  game.score = 0;
  game.speed = 5;
  game.targetSpeed = 5;
  game.frame = 0;
  dino.y = GROUND_Y - 46;
  dino.vy = 0;
  dino.jumping = false;
  obstacles = [];
  clouds = [];
  dust = [];
  popups = [];
  gameOverlay.classList.remove('show');
}

function updateGameFn() {
  game.frame++;
  game.score += 0.1;

  if (Math.floor(game.score) % 100 === 0 && Math.floor(game.score) > 0) {
    if (game.targetSpeed < 14) {
      game.targetSpeed += 0.45;
      addPopupFn(dino.x + 20, dino.y - 15, 'SPEED UP!', '#ff00ff');
    }
  }
  game.speed += (game.targetSpeed - game.speed) * 0.05;

  if (dino.jumping) {
    dino.y += dino.vy;
    dino.vy += 0.45;
    if (dino.y >= GROUND_Y - 46) {
      dino.y = GROUND_Y - 46;
      dino.vy = 0;
      dino.jumping = false;
      for (let i = 0; i < 5; i++) {
        dust.push({
          x: dino.x + 10 + i * 5,
          y: GROUND_Y - 1,
          vx: (i - 2) * 0.8,
          vy: -(0.5 + Math.random() * 1.0),
          r: 1 + Math.random() * 2,
          life: 1.0,
        });
      }
    }
  } else {
    dino.legT += game.speed;
    if (dino.legT > 60) {
      dino.leg = dino.leg === 0 ? 1 : 0;
      dino.legT = 0;
    }
  }

  dust.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.025;
  });
  dust = dust.filter(p => p.life > 0);

  popups.forEach(p => {
    p.y += p.vy;
    p.alpha -= 0.02;
  });
  popups = popups.filter(p => p.alpha > 0);

  if (clouds.length < 4 && Math.random() < 0.005) {
    clouds.push({
      x: W + 10,
      y: 30 + Math.random() * 100,
      w: 80 + Math.random() * 70,
      h: 20 + Math.random() * 15,
      s: 0.15 + Math.random() * 0.35,
    });
  }
  clouds.forEach(c => c.x -= c.s * game.speed);
  clouds = clouds.filter(c => c.x + c.w > -10);

  if (obstacles.length === 0 || (W - obstacles[obstacles.length - 1].x > (180 + Math.random() * 200))) {
    const isBird = game.score > 150 && Math.random() < 0.28;
    if (isBird) {
      obstacles.push({
        x: W + 20,
        y: GROUND_Y - 45 - Math.random() * 45,
        w: 24, h: 20,
        type: 'bird',
      });
    } else {
      obstacles.push({
        x: W + 20,
        y: GROUND_Y - (22 + Math.random() * 14),
        w: 12 + Math.floor(Math.random() * 2) * 10,
        h: 22 + Math.floor(Math.random() * 10),
        type: 'cactus',
      });
    }
  }

  obstacles.forEach(obs => {
    obs.x -= game.speed;

    const hitboxScale = 0.85;
    const ax1 = dino.x + dino.w * (1 - hitboxScale);
    const ax2 = dino.x + dino.w * hitboxScale;
    const ay1 = dino.y + dino.h * (1 - hitboxScale);
    const ay2 = dino.y + dino.h * hitboxScale;

    const bx1 = obs.x;
    const bx2 = obs.x + obs.w;
    const by1 = obs.y;
    const by2 = obs.y + obs.h;

    if (ax1 < bx2 && ax2 > bx1 && ay1 < by2 && ay2 > by1) {
      gameOverFn();
    }
  });
  obstacles = obstacles.filter(obs => obs.x + obs.w > -20);
}

function gameOverFn() {
  game.over = true;
  shake = 15;
  if (game.score > game.highScore) {
    game.highScore = Math.floor(game.score);
    localStorage.setItem('dinoHigh', game.highScore);
  }
  finalScoreEl.textContent = Math.floor(game.score);
  finalBestEl.textContent = game.highScore;
  gameOverlay.classList.add('show');
}

function renderFn() {
  ctx.save();
  if (shake > 0) {
    const dx = (Math.random() - 0.5) * shake;
    const dy = (Math.random() - 0.5) * shake;
    ctx.translate(dx, dy);
    shake *= 0.9;
    if (shake < 0.5) shake = 0;
  }

  drawBg();
  drawStarsFn();
  drawMoonFn();
  drawMountains();
  drawGroundFn();
  drawCloudsFn();
  drawObstaclesFn();
  drawDustFn();
  drawDinoFn();

  ctx.strokeStyle = 'rgba(0, 240, 255, 0.03)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(W, GROUND_Y);
  ctx.stroke();
  ctx.shadowBlur = 0;
  drawPopupsFn();
  drawHUD();

  ctx.restore();
}

let lt = 0;
function loop(t) {
  const dt = t - lt;
  lt = t;
  if (!game.over && game.started) {
    game.accumulator += dt;
    while (game.accumulator >= game.step) {
      updateGameFn();
      game.accumulator -= game.step;
    }
  }
  renderFn();
  requestAnimationFrame(loop);
}

function onJump() {
  if (!game.started) { startOverlay.classList.add('hidden'); resetGameFn(); return; }
  if (game.over) { resetGameFn(); return; }
  if (!dino.jumping) { dino.vy = -12; dino.jumping = true; }
}

canvas.addEventListener('touchstart', e => { e.preventDefault(); onJump(); }, { passive: false });
canvas.addEventListener('mousedown', e => { onJump(); });
canvas.addEventListener('click', e => e.preventDefault());

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); onJump(); }
});

restartBtn.addEventListener('click', e => {
  e.stopPropagation();
  resetGameFn();
});

requestAnimationFrame(t => {
  lt = t;
  requestAnimationFrame(loop);
});
</script>
